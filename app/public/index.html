<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UC Cockpit</title>
  <link rel="stylesheet" href="/vendor/xterm/xterm.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>UC Cockpit</h1>
      <p>Four-lane semi-automation console</p>
    </div>
    <div class="actions">
      <input id="password" type="password" placeholder="UC password">
      <button id="saveConfig">Save Lanes</button>
      <button id="connectAll">Connect All</button>
      <button id="disconnectAll">Disconnect</button>
      <button id="clearAll">Clear Views</button>
      <button id="loadSim">Local Sim</button>
      <a class="button-link" href="/api/audit" target="_blank">Audit</a>
    </div>
  </header>

  <section class="networkbar">
    <input id="scanCidr" autocomplete="off" spellcheck="false" value="192.168.11.0/24">
    <button id="scanNetwork">Scan Network</button>
    <button id="repeatScan">Repeat Off</button>
    <button id="applyScan">Apply Found</button>
    <span id="scanStatus">No network scan yet</span>
  </section>

  <section class="network-view">
    <div class="section-title">
      <strong>Network View</strong>
      <span id="networkSummary">No hosts</span>
    </div>
    <div class="network-table-wrap">
      <table class="network-table">
        <thead>
          <tr>
            <th>IP</th>
            <th>Equipment</th>
            <th>MAC / Vendor</th>
            <th>Services</th>
            <th>ESP Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="networkRows">
          <tr><td colspan="6">Run a scan to map the commutator.</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="commandbar">
    <input id="command" autocomplete="off" spellcheck="false" placeholder="Type a UC menu command, then press Enter">
    <button id="sendReady">Send Ready</button>
    <button id="sendAll">Send All</button>
    <span id="readySummary">0 ready</span>
  </section>

  <main id="lanes" class="lanes"></main>

  <template id="laneTemplate">
    <section class="lane">
      <div class="lane-head">
        <div>
          <strong class="lane-name"></strong>
          <span class="lane-state"></span>
        </div>
        <label class="ready-toggle"><input type="checkbox" class="lane-ready" checked> ready</label>
      </div>
      <div class="install-map">
        <div class="map-node map-uplink">
          <span class="map-label map-uplink-label">ESP proxy</span>
          <strong class="map-uplink-ip">unknown</strong>
        </div>
        <div class="map-line vertical top"></div>
        <div class="map-node map-switch">
          <span class="map-label">commutator</span>
          <strong>local island</strong>
        </div>
        <div class="map-line horizontal"></div>
        <div class="map-devices">
          <div class="map-node map-device">
            <span class="map-label">UC</span>
            <strong class="map-uc-ip">192.168.1.100</strong>
          </div>
          <div class="map-node map-device">
            <span class="map-label">validators</span>
            <strong class="map-validators">pending</strong>
          </div>
          <div class="map-node map-device">
            <span class="map-label">peripheral</span>
            <strong class="map-peripheral">pending</strong>
          </div>
          <div class="map-node map-device">
            <span class="map-label">combord</span>
            <strong class="map-combord">pending</strong>
          </div>
        </div>
      </div>
      <div class="lane-config">
        <input class="lane-host" placeholder="host">
        <input class="lane-port" placeholder="port">
        <input class="lane-login" placeholder="login">
        <input class="lane-esp" placeholder="ESP URL">
      </div>
      <div class="terminal"></div>
      <div class="lane-actions">
        <button class="connect-one">Connect</button>
        <button class="send-one">Send Here</button>
        <button class="clear-one">Clear</button>
        <button class="mode-off">OFF</button>
        <button class="mode-m1">M1</button>
        <button class="mode-m0">M0</button>
        <button class="mode-check">Check</button>
      </div>
    </section>
  </template>

  <script src="/vendor/xterm/xterm.js"></script>
  <script src="/vendor/addon-fit/addon-fit.js"></script>
  <script src="/app.js"></script>
</body>
</html>
