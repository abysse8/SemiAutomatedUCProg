[platformio]
default_envs = esp32p4_off_proxy

[env:esp32s3_usb_msc]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D UC_SD_CS=10
  -D UC_MODE_BUTTON=0
  -D UC_STATUS_LED=48
lib_deps =
  greiman/SdFat@^2.3.0

[env:esp32p4_probe]
platform = espressif32
board = esp32-p4-function-ev-board
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D UC_SD_CS=10
  -D UC_MODE_BUTTON=0
  -D UC_STATUS_LED=48
lib_deps =
  greiman/SdFat@^2.3.0

[env:esp32p4_idf_probe]
platform = espressif32
board = esp32-p4-function-ev-board
framework = espidf
upload_port = COM5
monitor_port = COM5
platform_packages =
  platformio/toolchain-riscv32-esp@15.2.0+20251204
build_src_filter =
  -<*>
  +<probe_espidf.c>

[env:esp32p4_off_proxy]
platform = espressif32
board = esp32-p4-function-ev-board
framework = espidf
upload_port = COM5
monitor_port = COM5
monitor_speed = 115200
platform_packages =
  platformio/toolchain-riscv32-esp@15.2.0+20251204
build_flags =
  -D CONFIG_ESP_WIFI_ENABLED=1
  -D CONFIG_SLAVE_IDF_TARGET_ESP32C6=1
  -D CONFIG_WIFI_RMT_STATIC_RX_BUFFER_NUM=10
  -D CONFIG_WIFI_RMT_DYNAMIC_RX_BUFFER_NUM=32
  -D CONFIG_WIFI_RMT_TX_BUFFER_TYPE=1
  -D CONFIG_WIFI_RMT_DYNAMIC_RX_MGMT_BUF=0
  -D CONFIG_WIFI_RMT_ESPNOW_MAX_ENCRYPT_NUM=7
  -D CONFIG_ESP_HOSTED_SPI_CLK_FREQ=10
